<html lang="en">
<head>
<meta charset="UTF-8">

<title>AgriSpray Pro | Enterprise Farm Management</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, onValue, update, get, serverTimestamp, push, remove, runTransaction, off, onDisconnect }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const cfg = {
  apiKey:"AIzaSyDCXPRlN5CVmfZgpO7_NE2hRCqCr0h5mqY",
  authDomain:"agrispray-pro.firebaseapp.com",
  databaseURL:"https://agrispray-pro-default-rtdb.firebaseio.com",
  projectId:"agrispray-pro",
  storageBucket:"agrispray-pro.firebasestorage.app",
  messagingSenderId:"72689059265",
  appId:"1:72689059265:web:48bd60e10f5f11d199db40"
};
const app = initializeApp(cfg);
const db  = getDatabase(app);

let _fbListenersRegistered = false;
window.FB = { db, ref, set, onValue, update, get, serverTimestamp, push, remove, runTransaction, off };
window.firebaseReady = true;

onValue(ref(db, '.info/connected'), snap => {
  window.isOnline = snap.val() === true;
  const b = document.getElementById('syncBadge');
  if (!b) return;
  if (window.isOnline) {
    b.innerHTML = '🟢 Live'; b.style.color = '#4caf50'; b.style.background = 'rgba(76,175,80,0.15)';
    (window._q || []).forEach(f => { try { f(); } catch(e){} });
    window._q = [];
    window._updatePresence && window._updatePresence();
  } else {
    b.innerHTML = '🔴 Offline'; b.style.color = '#ff9800'; b.style.background = 'rgba(255,152,0,0.15)';
  }
});

window._updatePresence = function() {
  if (!window.CU || !window.firebaseReady || !window.FB) return;
  const u = window.CU;
  const presRef = window.FB.ref(window.FB.db, `presence/${u.id}`);
  window.FB.update(presRef, { id:u.id, name:u.name, role:u.role, designation:u.designation||u.role, online:true, lastSeen:Date.now(), status:'active' }).catch(()=>{});
  onDisconnect(presRef).update({ online:false, lastSeen:Date.now() }).catch(()=>{});
};

window._listenPresence = function() {
  if (!window.FB) return;
  onValue(window.FB.ref(window.FB.db,'presence'), snap => {
    window._presenceData = snap.val() || {};
    if (window._page === 'team') window._renderTeamOnline && window._renderTeamOnline();
    const onlineCount = Object.values(window._presenceData).filter(p => p.online).length;
    const tc = document.getElementById('teamCount');
    if (tc) tc.innerText = onlineCount > 0 ? `${onlineCount} online` : 'Team';
  });
};

window._fbListen = function() {
  if (_fbListenersRegistered) return;
  _fbListenersRegistered = true;

  // ── BOOKINGS real-time ──
  onValue(ref(db,'bookings'), snap => {
    if (!window.AD) return;
    const data = snap.val(); if (!data) return;
    const deleted = window.AD.deletedBKIds || [];
    let changed = false;
    Object.values(data).forEach(fb => {
      if (!fb || !fb.id) return;
      if (deleted.includes(fb.id)) return;
      const i = window.AD.bookings.findIndex(b => b.id === fb.id);
      if (i === -1) {
        window.AD.bookings.push(fb); changed = true;
        // Notify relevant users
        if (window.CU?.role === 'pilot' && fb.assignedTo === window.CU.id)
          window._showNotif(`🆕 New job assigned: ${fb.id} — ${fb.farmer} (${fb.acres} ac)`, 'info');
        if (window.CU?.role === 'manager')
          window._showNotif(`📋 Booking ${fb.id} by ${fb.createdByName||'staff'}`, 'info');
      } else {
        const old = window.AD.bookings[i];
        if (old.status !== fb.status || old.assignedTo !== fb.assignedTo || old.completionData !== fb.completionData) {
          changed = true;
          // Pilot assigned notification
          if (fb.assignedTo && old.assignedTo !== fb.assignedTo && window.CU?.id === fb.assignedTo)
            window._showNotif(`✈️ You were assigned to ${fb.id} — ${fb.farmer}`, 'info');
          // Completion notification
          if (fb.status === 'completed' && old.status !== 'completed') {
            const msg = `✅ ${fb.id} (${fb.farmer}) completed by ${fb.completedByName||'Pilot'}`;
            if (window.CU?.role === 'manager') window._showNotif(msg,'success');
            if (window.CU?.role === 'agri' && window.CU.id === fb.createdBy) window._showNotif(msg,'success');
          }
          if (fb.status === 'invoiced' && old.status !== 'invoiced') {
            if (window.CU?.role === 'agri' && window.CU.id === fb.createdBy)
              window._showNotif(`🧾 Booking ${fb.id} invoiced by ${fb.invoicedByName||'staff'}`, 'info');
          }
        }
        window.AD.bookings[i] = fb;
      }
    });
    // Handle deletions cascaded from manager
    if (window.AD.deletedBKIds && window.AD.deletedBKIds.length) {
      window.AD.bookings = window.AD.bookings.filter(b => !window.AD.deletedBKIds.includes(b.id));
    }
    if (changed) {
      localStorage.setItem('asp_data', JSON.stringify(window.AD));
      window._refreshPage && window._refreshPage('bookings');
      window._refreshPage && window._refreshPage('dashboard');
    }
  });

  // ── INVOICES real-time ──
  onValue(ref(db,'invoices'), snap => {
    if (!window.AD) return;
    const data = snap.val(); if (!data) return;
    const deleted = window.AD.deletedINVIds || [];
    let changed = false;
    Object.values(data).forEach(fb => {
      if (!fb || !fb.id) return;
      if (deleted.includes(fb.id)) return;
      const i = window.AD.invoices.findIndex(x => x.id === fb.id);
      if (i === -1) {
        window.AD.invoices.push(fb); changed = true;
        if (window.CU?.role === 'manager')
          window._showNotif(`📄 Invoice ${fb.id} by ${fb.createdByName||'staff'} — ₨${(fb.total||0).toLocaleString()}`, 'info');
      } else {
        if (window.AD.invoices[i].status !== fb.status) {
          changed = true;
          const msg = fb.status === 'approved' ? `✅ Invoice ${fb.id} approved!` : `❌ Invoice ${fb.id} rejected`;
          if (window.CU?.id === fb.createdBy || window.CU?.role !== 'manager')
            window._showNotif(msg, fb.status==='approved'?'success':'error');
        }
        window.AD.invoices[i] = fb;
      }
    });
    if (changed) {
      localStorage.setItem('asp_data', JSON.stringify(window.AD));
      window._refreshPage && window._refreshPage('invoices');
      window._refreshPage && window._refreshPage('dashboard');
    }
  });

  // ── USERS real-time ──
  onValue(ref(db,'users'), snap => {
    const data = snap.val(); if (!data || !window.AD) return;
    Object.values(data).forEach(fu => {
      const i = window.AD.users.findIndex(u => u.id === fu.id);
      if (i === -1) window.AD.users.push(fu);
      else window.AD.users[i] = { ...window.AD.users[i], ...fu };
    });
    localStorage.setItem('asp_data', JSON.stringify(window.AD));
  });

  // ── NOTIFICATIONS real-time (per-user path) ──
  if (window.CU) {
    onValue(ref(db, `notifications/${window.CU.id}`), snap => {
      const data = snap.val(); if (!data || !window.AD) return;
      let changed = false;
      Object.values(data).forEach(fn => {
        if (!fn || !fn.id) return;
        if (!window.AD.notifications.find(n => n.id === fn.id)) {
          window.AD.notifications.unshift(fn);
          changed = true;
          // Show toast for new incoming notification
          window._toastMsg(fn.msg, fn.type || 'info');
        }
      });
      if (changed) {
        localStorage.setItem('asp_data', JSON.stringify(window.AD));
        window.updateNotifBadge && window.updateNotifBadge();
      }
    });
  }

  window._updatePresence();
  window._listenPresence();
  setInterval(() => window._updatePresence(), 30000);
};
</script>

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --g1:#0d6b35;--g2:#0a8a42;--g3:#064a22;--g4:#031a0d;
  --gold:#f5a623;--goldd:#e8951a;--gold2:#ffd166;
  --accent:#06d6a0;--accent2:#00b4d8;--purple:#7b5ea7;
  --red:#e63946;--grn:#2dc653;--warn:#f4a261;
  --bg:#050d07;--bg2:#080f09;--bg3:#0b1a0e;
  --card:rgba(255,255,255,0.025);--card2:rgba(255,255,255,0.045);
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --t1:#f8faf8;--t2:rgba(248,250,248,0.72);--t3:rgba(248,250,248,0.38);--t4:rgba(248,250,248,0.18);
  --shadow:0 8px 32px rgba(0,0,0,0.6);--shadow2:0 2px 12px rgba(0,0,0,0.4);
  --radius:16px;--radius2:12px;--radius3:8px;
}
html{scroll-behavior:smooth;height:100%;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;overflow-x:hidden;
  background-image:radial-gradient(ellipse 80% 50% at 10% 0%,rgba(13,107,53,0.15) 0%,transparent 60%),
                   radial-gradient(ellipse 60% 40% at 90% 100%,rgba(6,214,160,0.06) 0%,transparent 50%);}
.login-screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px;
  background:radial-gradient(ellipse 100% 100% at 30% 30%,rgba(13,107,53,0.25),var(--bg));}
.login-card{width:440px;max-width:100%;background:rgba(255,255,255,0.03);backdrop-filter:blur(40px) saturate(1.5);
  border:1px solid var(--border2);border-radius:28px;padding:44px 40px;text-align:center;
  box-shadow:0 32px 80px rgba(0,0,0,0.7),inset 0 1px 0 rgba(255,255,255,0.08);}
.login-logo{font-size:52px;margin-bottom:16px;display:block;filter:drop-shadow(0 4px 16px rgba(245,166,35,0.4));}
.login-card h1{font-size:30px;font-weight:900;letter-spacing:-0.5px;
  background:linear-gradient(135deg,#fff 30%,var(--gold) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px;}
.login-sub{font-size:11px;color:var(--t3);margin-bottom:32px;letter-spacing:2px;text-transform:uppercase;}
.login-field{position:relative;margin-bottom:14px;}
.login-field input{width:100%;padding:14px 18px;background:rgba(0,0,0,0.4);border:1px solid var(--border2);
  border-radius:50px;color:var(--t1);font-size:14px;font-family:'Inter',sans-serif;transition:all 0.25s;}
.login-field input:focus{outline:none;border-color:var(--gold);background:rgba(0,0,0,0.55);box-shadow:0 0 0 3px rgba(245,166,35,0.12);}
.login-field .eye{position:absolute;right:18px;top:50%;transform:translateY(-50%);cursor:pointer;color:var(--t3);font-size:14px;}
.login-btn{width:100%;padding:14px;margin-top:6px;background:linear-gradient(135deg,var(--g1),var(--g2),var(--g3));
  border:none;border-radius:50px;color:#fff;font-weight:700;font-size:15px;cursor:pointer;letter-spacing:0.5px;transition:all 0.25s;
  box-shadow:0 4px 20px rgba(13,107,53,0.5);}
.login-btn:hover{transform:translateY(-1px);box-shadow:0 6px 28px rgba(13,107,53,0.65);}
.login-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
.login-err{color:var(--red);font-size:12px;margin-top:12px;display:none;padding:10px 16px;background:rgba(230,57,70,0.1);border:1px solid rgba(230,57,70,0.2);border-radius:10px;}
#mainApp{display:none;}
.sidebar{position:fixed;top:0;left:0;width:260px;height:100vh;z-index:200;overflow-y:auto;overflow-x:hidden;
  background:rgba(5,10,6,0.97);backdrop-filter:blur(20px);border-right:1px solid var(--border);
  transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);display:flex;flex-direction:column;}
.sidebar.hidden{transform:translateX(-100%);}
.sidebar-logo{padding:24px 20px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;flex-shrink:0;}
.sidebar-logo .logo-icon{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--g1),var(--g3));font-size:22px;flex-shrink:0;box-shadow:0 4px 14px rgba(13,107,53,0.5);}
.sidebar-logo h2{font-size:14px;font-weight:800;color:var(--t1);letter-spacing:-0.2px;line-height:1.2;}
.sidebar-logo p{font-size:9px;color:var(--t3);letter-spacing:1px;text-transform:uppercase;margin-top:1px;}
nav{padding:12px 0;flex:1;}
.nav-sec{font-size:9px;font-weight:700;color:var(--t4);text-transform:uppercase;letter-spacing:2px;padding:14px 22px 6px;}
.nav-item{display:flex;align-items:center;gap:11px;padding:10px 20px;cursor:pointer;color:var(--t3);
  transition:all 0.2s;border-left:3px solid transparent;font-size:13px;font-weight:500;margin:1px 0;}
.nav-item:hover{background:rgba(255,255,255,0.04);color:var(--t1);}
.nav-item.active{background:linear-gradient(90deg,rgba(13,107,53,0.25),transparent);border-left-color:var(--gold);color:var(--gold);}
.nav-item.active i{color:var(--gold);}
.nav-item i{width:18px;font-size:13px;text-align:center;color:var(--t4);transition:color 0.2s;}
.nav-item:hover i{color:var(--t2);}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;border-radius:20px;min-width:18px;height:18px;font-size:9px;display:flex;align-items:center;justify-content:center;font-weight:700;padding:0 5px;}
.sidebar-foot{padding:16px 20px;border-top:1px solid var(--border);flex-shrink:0;}
.sidebar-clock{font-size:11px;color:var(--t3);text-align:center;line-height:1.6;}
.main-wrap{margin-left:260px;min-height:100vh;transition:margin 0.3s;}
.topbar{background:rgba(5,10,6,0.92);backdrop-filter:blur(20px) saturate(1.5);border-bottom:1px solid var(--border);
  padding:0 24px;height:60px;display:flex;justify-content:space-between;align-items:center;gap:12px;
  position:sticky;top:0;z-index:100;}
.topbar-left{display:flex;align-items:center;gap:14px;}
.menu-toggle{display:none;background:var(--card2);border:1px solid var(--border);color:var(--t2);
  width:36px;height:36px;border-radius:var(--radius3);cursor:pointer;font-size:15px;
  align-items:center;justify-content:center;transition:all 0.2s;}
.menu-toggle:hover{background:var(--card);color:var(--t1);}
.page-ttl{font-size:15px;font-weight:700;color:var(--t1);letter-spacing:-0.2px;}
.topbar-right{display:flex;align-items:center;gap:10px;}
.weather-pill{display:flex;align-items:center;gap:10px;background:rgba(0,0,0,0.5);
  border:1px solid var(--border2);padding:7px 14px;border-radius:50px;cursor:default;}
.weather-pill .wicon{font-size:20px;line-height:1;}
.weather-pill .wtemp{font-size:16px;font-weight:800;color:var(--t1);}
.spray-tag{padding:2px 8px;border-radius:20px;font-size:9px;font-weight:700;letter-spacing:0.5px;white-space:nowrap;}
.spray-good{background:rgba(45,198,83,0.15);color:var(--grn);border:1px solid rgba(45,198,83,0.2);}
.spray-warn{background:rgba(244,162,97,0.15);color:var(--warn);border:1px solid rgba(244,162,97,0.2);}
.spray-bad{background:rgba(230,57,70,0.15);color:var(--red);border:1px solid rgba(230,57,70,0.2);}
.bell-wrap{position:relative;cursor:pointer;width:36px;height:36px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;background:var(--card);
  border:1px solid var(--border);color:var(--t2);font-size:15px;transition:all 0.2s;}
.bell-wrap:hover{background:var(--card2);color:var(--t1);}
.bell-dot{position:absolute;top:5px;right:5px;background:var(--red);color:#fff;border-radius:50%;min-width:14px;height:14px;font-size:8px;display:flex;align-items:center;justify-content:center;font-weight:700;border:2px solid var(--bg);}
#syncBadge{font-size:10px;font-weight:700;padding:4px 10px;border-radius:20px;letter-spacing:0.3px;white-space:nowrap;}
.user-pill{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);border-radius:50px;padding:5px 14px 5px 6px;}
.user-avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--g1),var(--gold));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0;}
.role-tag{font-size:9px;font-weight:700;color:var(--gold);letter-spacing:0.5px;text-transform:uppercase;}
.uname{font-size:12px;font-weight:600;color:var(--t1);}
.logout-btn{background:rgba(230,57,70,0.1);border:1px solid rgba(230,57,70,0.2);padding:5px 12px;border-radius:30px;color:var(--red);cursor:pointer;font-size:11px;font-weight:600;transition:all 0.2s;font-family:'Inter',sans-serif;}
.logout-btn:hover{background:rgba(230,57,70,0.2);}

.team-online-dot{width:6px;height:6px;border-radius:50%;background:var(--grn);animation:pulse-dot 2s infinite;}

.card:hover{border-color:var(--border2);}
.card-title{font-size:13px;font-weight:700;color:var(--gold);display:flex;align-items:center;gap:8px;padding-bottom:14px;margin-bottom:16px;border-bottom:1px solid var(--border);}

.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;}

.kpi:hover{transform:translateY(-2px);border-color:var(--border2);box-shadow:var(--shadow2);}
.kpi-val{font-size:24px;font-weight:900;letter-spacing:-0.5px;line-height:1;}
.kpi-lbl{font-size:11px;color:var(--t3);margin-top:5px;font-weight:500;letter-spacing:0.3px;}
.kpi-sub{font-size:10px;color:var(--t4);margin-top:3px;}
label{display:block;font-size:10px;font-weight:700;color:var(--t3);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.8px;}
input,select,textarea{width:100%;padding:11px 14px;background:rgba(0,0,0,0.4);border:1px solid var(--border2);border-radius:var(--radius3);color:var(--t1);font-size:13px;transition:all 0.2s;font-family:'Inter',sans-serif;letter-spacing:0.2px;}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--gold);background:rgba(0,0,0,0.55);box-shadow:0 0 0 3px rgba(245,166,35,0.08);}
input::placeholder{color:var(--t4);}
select option{background:#0b1a0e;color:var(--t1);}
input[readonly]{opacity:0.65;cursor:default;border-style:dashed;}
textarea{resize:vertical;min-height:64px;}
.btn{padding:9px 18px;border-radius:50px;border:none;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:7px;font-size:12px;transition:all 0.2s;font-family:'Inter',sans-serif;letter-spacing:0.3px;white-space:nowrap;}
.btn:active{transform:scale(0.96);}
.btn:hover{filter:brightness(1.1);}
.btn-primary{background:linear-gradient(135deg,#0d6b35,#0a8a42);color:#fff;box-shadow:0 2px 12px rgba(13,107,53,0.35);}
.btn-secondary{background:linear-gradient(135deg,var(--gold),var(--goldd));color:#1a0f00;font-weight:700;}
.btn-danger{background:linear-gradient(135deg,#c62828,var(--red));color:#fff;}
.btn-success{background:linear-gradient(135deg,#1b5e20,var(--grn));color:#fff;}
.btn-outline{background:transparent;border:1px solid var(--border2);color:var(--t2);}
.btn-outline:hover{border-color:var(--gold);color:var(--gold);}
.btn-info{background:linear-gradient(135deg,#006064,var(--accent2));color:#fff;}
.btn-sm{padding:6px 14px;font-size:11px;}
.btn-xs{padding:4px 10px;font-size:10px;border-radius:20px;}
.btn:disabled{opacity:0.5;cursor:not-allowed;transform:none !important;filter:none !important;}
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:var(--radius2);border:1px solid var(--border);}
table{width:100%;border-collapse:collapse;min-width:480px;}
thead{background:rgba(0,0,0,0.4);}
th{font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:1px;padding:11px 12px;white-space:nowrap;border-bottom:1px solid var(--border);}
td{font-size:12px;padding:11px 12px;border-bottom:1px solid rgba(255,255,255,0.03);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tbody tr{transition:background 0.15s;}
tbody tr:hover td{background:rgba(255,255,255,0.025);}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:30px;font-size:10px;font-weight:700;letter-spacing:0.3px;}
.b-pending{background:rgba(244,162,97,0.15);color:var(--warn);border:1px solid rgba(244,162,97,0.2);}
.b-completed{background:rgba(45,198,83,0.15);color:var(--grn);border:1px solid rgba(45,198,83,0.2);}
.b-approved{background:rgba(0,180,216,0.15);color:var(--accent2);border:1px solid rgba(0,180,216,0.2);}
.b-rejected{background:rgba(230,57,70,0.15);color:var(--red);border:1px solid rgba(230,57,70,0.2);}
.b-active{background:rgba(45,198,83,0.15);color:var(--grn);border:1px solid rgba(45,198,83,0.2);}
.b-inactive{background:rgba(230,57,70,0.15);color:var(--red);border:1px solid rgba(230,57,70,0.2);}
.b-fired{background:rgba(183,28,28,0.2);color:#ef9a9a;border:1px solid rgba(183,28,28,0.3);}
.b-manager{background:rgba(245,166,35,0.15);color:var(--gold);border:1px solid rgba(245,166,35,0.2);}
.b-pilot{background:rgba(0,180,216,0.15);color:var(--accent2);border:1px solid rgba(0,180,216,0.2);}
.b-agri{background:rgba(45,198,83,0.15);color:var(--grn);border:1px solid rgba(45,198,83,0.2);}
.b-invoiced{background:rgba(123,94,167,0.15);color:#b39ddb;border:1px solid rgba(123,94,167,0.2);}
.completion-alert{background:linear-gradient(135deg,rgba(45,198,83,0.12),rgba(6,214,160,0.06));border:1px solid rgba(45,198,83,0.25);border-radius:12px;padding:12px 16px;display:flex;align-items:center;gap:12px;margin-bottom:10px;animation:slideIn 0.4s ease;}
@keyframes slideIn{from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:translateY(0);}}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);backdrop-filter:blur(8px);z-index:500;align-items:center;justify-content:center;padding:16px;}
.modal.open{display:flex;animation:fadeIn 0.2s ease;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.modal-box{background:#0b1a0e;border:1px solid var(--border2);border-radius:24px;padding:26px;max-width:620px;width:100%;max-height:92vh;overflow-y:auto;box-shadow:0 40px 100px rgba(0,0,0,0.8);}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.modal-hdr h3{font-size:15px;font-weight:700;color:var(--gold);}
.modal-close{background:rgba(255,255,255,0.07);border:1px solid var(--border);color:var(--t2);width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
.modal-close:hover{background:rgba(230,57,70,0.15);border-color:rgba(230,57,70,0.3);color:var(--red);}
.toast-wrap{position:fixed;bottom:24px;right:20px;z-index:9000;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
.toast{background:rgba(8,16,9,0.97);backdrop-filter:blur(20px);border:1px solid var(--border2);border-radius:var(--radius2);
  padding:11px 18px;display:flex;align-items:center;gap:10px;font-size:13px;font-weight:500;
  animation:slideUp 0.3s cubic-bezier(0.4,0,0.2,1);max-width:340px;pointer-events:all;box-shadow:var(--shadow);}
@keyframes slideUp{from{transform:translateY(16px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.fin-card{background:linear-gradient(135deg,rgba(13,107,53,0.1),rgba(0,0,0,0.3));border:1px solid rgba(13,107,53,0.2);border-radius:var(--radius);padding:20px;margin-bottom:18px;}
.fin-amt{font-size:28px;font-weight:900;color:var(--gold);letter-spacing:-0.5px;}
.progress-bar{background:rgba(255,255,255,0.06);border-radius:20px;height:6px;margin:10px 0;overflow:hidden;}
.progress-fill{height:100%;transition:width 0.6s ease;border-radius:20px;}
.receipt{background:#fff;color:#111;padding:14px;font-family:'Courier New',monospace;font-size:11px;width:280px;margin:0 auto;border-radius:10px;line-height:1.6;}
.receipt hr{border:none;border-top:1px dashed #bbb;margin:7px 0;}
.receipt .rh{text-align:center;font-weight:bold;}
.receipt .rf{text-align:center;font-size:10px;color:#555;}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:150;backdrop-filter:blur(2px);}
.overlay.show{display:block;}
.presence-member{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;transition:background 0.15s;}
.presence-member:hover{background:rgba(255,255,255,0.03);}
.presence-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#fff;flex-shrink:0;}
.presence-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;border:2px solid var(--bg);}
.presence-dot.online{background:var(--grn);box-shadow:0 0 6px rgba(45,198,83,0.5);}
.presence-dot.offline{background:var(--t4);}
.chart-wrap{position:relative;padding:8px 0;}
.chart-tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.chart-tab{padding:6px 16px;border-radius:30px;border:1px solid var(--border2);background:transparent;color:var(--t3);font-size:11px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.2s;}
.chart-tab.active{background:linear-gradient(135deg,var(--g1),var(--g2));color:#fff;border-color:transparent;box-shadow:0 2px 10px rgba(13,107,53,0.4);}
.pnl-summary{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px;}
.pnl-box{flex:1;min-width:120px;padding:14px 18px;border-radius:12px;border:1px solid var(--border);}
.pnl-box.revenue{background:rgba(45,198,83,0.07);border-color:rgba(45,198,83,0.15);}
.pnl-box.expense{background:rgba(230,57,70,0.07);border-color:rgba(230,57,70,0.15);}
.pnl-box.profit{background:rgba(0,180,216,0.07);border-color:rgba(0,180,216,0.15);}
.pnl-box.saving{background:rgba(123,94,167,0.07);border-color:rgba(123,94,167,0.15);}
.pnl-box-val{font-size:18px;font-weight:900;line-height:1;}
.pnl-box-lbl{font-size:10px;color:var(--t3);margin-top:4px;font-weight:500;}
.workflow-step{display:flex;align-items:center;gap:8px;padding:8px 14px;border-radius:10px;border:1px solid var(--border);background:var(--card);font-size:11px;font-weight:600;}
.workflow-step.done{border-color:rgba(45,198,83,0.3);background:rgba(45,198,83,0.06);color:var(--grn);}
.workflow-step.active{border-color:rgba(245,166,35,0.3);background:rgba(245,166,35,0.06);color:var(--gold);}
.workflow-step.pending{color:var(--t3);}
.info-required{border:1px solid rgba(244,162,97,0.4) !important;background:rgba(244,162,97,0.06) !important;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:10px;}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.2);}
@media(max-width:1100px){.g4{grid-template-columns:repeat(2,1fr);}.g5{grid-template-columns:repeat(3,1fr);}}

  .sidebar{transform:translateX(-100%);}
  .sidebar.open{transform:translateX(0);}
  .main-wrap{margin-left:0;}
  .menu-toggle{display:flex;}
  #syncBadge{display:none;}
  .g2,.g3{grid-template-columns:1fr;}
  .g4{grid-template-columns:repeat(2,1fr);}

}

<body>

<div id="loginScreen" class="login-screen">

    <div class="login-logo">🚁🌾</div>

  <div class="sidebar" id="sidebar">

    </div>

      <div class="topbar-right">

              <span id="wWind" style="font-size:10px;color:rgba(255,255,255,0.5);">💨 —</span>

<!-- MODALS -->

  </div>
</div>

<div class="toast-wrap" id="toasts"></div>
<div class="watermark">AgriSpray Pro © 2026 — Adnan Ali Ahmad Baloch</div>

<script>
// ============================================================
// CONSTANTS & DEFAULTS
// ============================================================
const DEF_USERS = [
  {id:'u1',email:'manager@agrispray.com',password:'Admin@123',role:'manager',designation:'Manager',name:'Adnan Ali',active:true,joinDate:'2024-01-01',salary:150000,status:'active',phone:'',cnic:'',access:['all']},
  {id:'u2',email:'pilot@agrispray.com',password:'Pilot@123',role:'pilot',designation:'Drone Pilot',name:'Ahmed Khan',active:true,joinDate:'2024-02-15',salary:50000,status:'active',phone:'',cnic:'',access:['dashboard','bookings','invoices']},
  {id:'u3',email:'agri@agrispray.com',password:'Agri@123',role:'agri',designation:'Agri Officer',name:'Aslam Khan',active:true,joinDate:'2024-03-01',salary:40000,status:'active',phone:'',cnic:'',access:['dashboard','bookings']}
];
const DESIGNATIONS = ['Manager','Accountant','Agri Officer','Drone Pilot','Helper / Farm Laborer','Driver','Technician','Supervisor','Agronomist','Warehouse Manager','Admin / HR','Other'];
const EXPENSE_CATS = ['Fuel','Electricity Bill','Gas Bill','Maintenance','Salary','Equipment','Labour','Seeds','Fertilizers','Pesticides','Other'];
const BLANK = {
  users:[],
  drones:[{id:'d1',name:'DJI Agras T40',status:'active',flights:0,hours:0,fuel:0,lastService:'',serviceHistory:[]},{id:'d2',name:'DJI Agras T20',status:'active',flights:0,hours:0,fuel:0,lastService:'',serviceHistory:[]}],
  generators:[{id:'g1',name:'Generator 5KVA',status:'active',fuelUsed:0,hoursRun:0,lastService:'',serviceHistory:[]}],
  bookings:[],invoices:[],expenses:[],investments:[],notifications:[],
  nextBK:1,nextINV:1,expCats:EXPENSE_CATS,
  deletedBKIds:[],deletedINVIds:[],deletedDefaults:[]
};

window.AD = {};
Object.assign(window.AD, JSON.parse(JSON.stringify(BLANK)));
let AD = window.AD;
let CU = null;
window.CU = null;
let _invPrint = null;
window._page = 'dashboard';
window._presenceData = {};

// ============================================================
// PERSISTENCE
// ============================================================
function save() {
  localStorage.setItem('asp_data', JSON.stringify(AD));
  window.AD = AD;
}

function load() {
  const s = localStorage.getItem('asp_data');
  if (s) { try { Object.assign(AD, JSON.parse(s)); window.AD = AD; } catch(e){} }
  if (!AD.deletedDefaults) AD.deletedDefaults = [];
  if (!AD.deletedBKIds)    AD.deletedBKIds    = [];
  if (!AD.deletedINVIds)   AD.deletedINVIds   = [];
  DEF_USERS.forEach(du => {
    if (AD.deletedDefaults.includes(du.id)) return;
    if (!AD.users.find(u => u.id === du.id)) AD.users.push(du);
  });
  ['nextBK','nextINV'].forEach(k => { if (!AD[k]) AD[k] = 1; });
  if (!AD.notifications) AD.notifications = [];
  if (!AD.generators)    AD.generators    = JSON.parse(JSON.stringify(BLANK.generators));
  if (!AD.expCats)       AD.expCats       = EXPENSE_CATS;
  AD.users.forEach(u => {
    if (!u.access || !u.access.length) u.access = [...(ROLE_ACCESS[u.role] || ['dashboard','bookings'])];
  });
  save();
  setTimeout(() => { window._fbListen && window._fbListen(); }, 900);
}

// ============================================================
// ID GENERATION
// ============================================================
async function bkNum() {
  if (window.firebaseReady && window.FB) {
    try {
      const key = window.FB.push(window.FB.ref(window.FB.db,'_idgen/bookings')).key;
      const n = AD.nextBK++; save();
      return `BK-${String(n).padStart(4,'0')}-${key.slice(-4)}`;
    } catch(e){}
  }
  const n = AD.nextBK++; save();
  return `BK-${String(n).padStart(4,'0')}`;
}
async function invNum() {
  if (window.firebaseReady && window.FB) {
    try {
      const key = window.FB.push(window.FB.ref(window.FB.db,'_idgen/invoices')).key;
      const n = AD.nextINV++; save();
      return `INV-${String(n).padStart(4,'0')}-${key.slice(-4)}`;
    } catch(e){}
  }
  const n = AD.nextINV++; save();
  return `INV-${String(n).padStart(4,'0')}`;
}

// ============================================================
// HELPERS
// ============================================================
function getRevenue(list) { return (list||AD.invoices).filter(i=>i.status==='approved').reduce((s,i)=>s+i.total,0); }
function getAcres(list)   { return (list||AD.invoices).filter(i=>i.status==='approved').reduce((s,i)=>s+i.acres,0); }
function fc(a) { return '₨ ' + (a||0).toLocaleString(); }
function today() { return new Date().toISOString().slice(0,10); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function openModal(id)  { document.getElementById(id).classList.add('open'); }
function toggleSidebar()  { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('overlay').classList.toggle('show'); }
function closeSidebar()   { document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('show'); }
function togglePwd() { const i = document.getElementById('lPwd'); i.type = i.type==='password'?'text':'password'; }

// ============================================================
// NOTIFICATIONS — unified, always visible
// ============================================================
window._toastMsg = function(msg, type='success') {
  const w = document.getElementById('toasts'); if (!w) return;
  const d = document.createElement('div'); d.className = 'toast';
  const ico = type==='success'?'fa-check-circle':type==='error'?'fa-times-circle':'fa-info-circle';
  const col = type==='success'?'#4caf50':type==='error'?'#ef5350':'#ff9800';
  d.innerHTML = `<i class="fas ${ico}" style="color:${col}"></i> <span style="flex:1;">${msg}</span>`;
  w.appendChild(d);
  setTimeout(() => d.remove(), 4000);
};

// _showNotif: save to local store + show toast + push to Firebase user notification path
window._showNotif = function(msg, type='info') {
  if (!CU) return;
  window._toastMsg(msg, type);
  _saveNotifLocal(msg, type);
};

function _saveNotifLocal(msg, type) {
  const n = { id: Date.now() + '_' + Math.random().toString(36).slice(2), msg, type, ts: new Date().toLocaleString('en-PK'), read: false };
  if (!AD.notifications) AD.notifications = [];
  AD.notifications.unshift(n);
  if (AD.notifications.length > 100) AD.notifications = AD.notifications.slice(0,100);
  save();
  updateNotifBadge();
}

// Push notification to a specific user via Firebase
function pushNotifToUser(userId, msg, type) {
  if (!window.firebaseReady || !window.FB) return;
  const n = { id: Date.now() + '_' + Math.random().toString(36).slice(2), msg, type, ts: new Date().toLocaleString('en-PK'), read: false };
  window.FB.push(window.FB.ref(window.FB.db, `notifications/${userId}`), n).catch(()=>{});
}

// addNotif: local notification + optional cross-user Firebase push
function addNotif(msg, type, targetUserId) {
  // Save locally if it's for current user
  if (!targetUserId || targetUserId === CU?.id || targetUserId === CU?.role) {
    _saveNotifLocal(msg, type);
    window._toastMsg(msg, type);
  }
  // Push to target user via Firebase
  if (targetUserId && targetUserId !== CU?.id) {
    // If target is a role string, push to all users of that role
    if (['manager','pilot','agri'].includes(targetUserId)) {
      AD.users.filter(u => u.role === targetUserId && u.status === 'active').forEach(u => {
        if (u.id !== CU?.id) pushNotifToUser(u.id, msg, type);
      });
    } else {
      pushNotifToUser(targetUserId, msg, type);
    }
  }
}

window.updateNotifBadge = function() {
  const cnt = (AD.notifications || []).filter(n => !n.read).length;
  const d = document.getElementById('notifDot');
  if (d) { d.style.display = cnt>0?'flex':'none'; d.innerText = cnt>9?'9+':cnt; }
};

function openNotifs() {
  const list = document.getElementById('notifList');
  if (!AD.notifications || !AD.notifications.length) {

async function initWeather() {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      async pos => { await fetchWeather(pos.coords.latitude, pos.coords.longitude); },
      async () => { await fetchWeatherByIP(); }, { timeout:8000 }
    );
  } else { await fetchWeatherByIP(); }
}
async function fetchWeatherByIP() {
  try { const r=await fetch('https://ipapi.co/json/'); const d=await r.json(); if(d.latitude&&d.longitude) await fetchWeather(d.latitude,d.longitude); else await fetchWeather(24.8607,67.0011); } catch(e){ await fetchWeather(24.8607,67.0011); }
}
async function fetchWeather(lat,lon) {
  try {
    const [wRes,gRes] = await Promise.all([
      fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,wind_speed_10m,precipitation,weathercode&wind_speed_unit=kmh`),
      fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`)
    ]);
    const w=await wRes.json(); const g=await gRes.json();
    const c=w.current; const temp=Math.round(c.temperature_2m); const wind=Math.round(c.wind_speed_10m);
    const rain=c.precipitation||0; const hum=c.relative_humidity_2m||0; const wc=c.weathercode||0;
    const city=g.address?.city||g.address?.town||g.address?.village||'Pakistan';
    const icons={0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',51:'🌦️',61:'🌧️',80:'🌦️',82:'⛈️',95:'⛈️'};
    const icon=icons[wc]||(rain>0?'🌧️':wind>20?'💨':temp>38?'🔥':'☀️');
    let advice='Ideal Spray',ac='spray-good';
    if(wind>20||rain>5){advice='Not Safe';ac='spray-bad';}
    else if(wind>15||hum>85){advice='Caution';ac='spray-warn';}
    document.getElementById('wIcon').innerText=icon;
    document.getElementById('wTemp').innerText=temp+'°C';
    document.getElementById('wLoc').innerText=city;
    document.getElementById('wAdvice').innerText=advice;
    document.getElementById('wAdvice').className=`spray-tag ${ac}`;
    const ww=document.getElementById('wWind'); if(ww) ww.innerText=`💨 ${wind} km/h`;
    const wh=document.getElementById('wHum');  if(wh) wh.innerText=`💧 ${hum}%`;
  } catch(e){ document.getElementById('wTemp').innerText='--°C'; }
}

function doLogin() {
  const e=document.getElementById('lEmail').value.trim().toLowerCase();
  const p=document.getElementById('lPwd').value;
  const btn=document.getElementById('lBtn');
  if(!e||!p){showErr('Please enter email and password.');return;}
  btn.disabled=true; btn.textContent='Signing in...';
  const attempt=()=>{
    const u=AD.users.find(u=>u.email.toLowerCase()===e&&u.password===p);
    btn.disabled=false; btn.textContent='Access Dashboard';
    if(!u){showErr('Invalid email or password.');return;}
    if(u.status==='fired'){showErr('Your employment has been terminated.');return;}
    if(u.status==='inactive'||!u.active){showErr('Account deactivated. Contact your manager.');return;}
    loginSuccess(u);
  };
  if(window.firebaseReady&&window.FB){
    window.FB.get(window.FB.ref(window.FB.db,'users')).then(snap=>{
      const data=snap.val();
      if(data) Object.values(data).forEach(fu=>{ const i=AD.users.findIndex(u=>u.id===fu.id); if(i===-1) AD.users.push(fu); else AD.users[i]=fu; });
      save(); attempt();
    }).catch(attempt);
  } else { attempt(); }
}
function showErr(msg){ const e=document.getElementById('lErr'); e.style.display='block'; e.innerHTML=`<i class="fas fa-exclamation-circle"></i> ${msg}`; setTimeout(()=>e.style.display='none',5000); }

function loginSuccess(u) {
  CU=u; window.CU=u;
  localStorage.setItem('asp_session', JSON.stringify({id:u.id}));
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('mainApp').style.display='block';
  document.getElementById('roleTag').innerText=u.designation||u.role;
  document.getElementById('uName').innerText=u.name.split(' ')[0];
  buildNav(); showPage('dashboard'); updateNotifBadge();
  window._toastMsg(`Welcome back, ${u.name}! 👋`);
  initWeather();
  setTimeout(()=>{ window._updatePresence&&window._updatePresence(); },1500);
}
function checkSession() {
  const s=localStorage.getItem('asp_session'); if(!s) return false;
  try {
    const {id}=JSON.parse(s);
    const u=AD.users.find(u=>u.id===id&&u.active&&u.status==='active');
    if(!u) return false;
    loginSuccess(u); return true;
  } catch(e){ return false; }
}
function logout() {
  if(window.FB&&CU) window.FB.update(window.FB.ref(window.FB.db,`presence/${CU.id}`),{online:false,lastSeen:Date.now()}).catch(()=>{});
  localStorage.removeItem('asp_session'); CU=null; window.CU=null;
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('mainApp').style.display='none';
}

// FINANCIAL CALCULATIONS
// ============================================================
function getFinancials() {
  const rev        = getRevenue();
  const saving60   = rev * 0.60;  // 60% drone savings
  const opFund40   = rev * 0.40;  // 40% operational fund
  const totExp     = AD.expenses.reduce((s,e)=>s+e.amount,0);
  const opBalance  = opFund40 - totExp;

  // Investment: net = total invested - 60% drone recovery from approved invoices
  const totInvested  = AD.investments.filter(i=>i.type==='investment').reduce((s,i)=>s+i.amount,0);
  const droneRecovery = saving60; // 60% of revenue = drone recovery against investment
  const manualRecovery = AD.investments.filter(i=>i.type==='recovery').reduce((s,i)=>s+i.amount,0);
  const totalRecovered = droneRecovery + manualRecovery;
  const netBalance     = totInvested - totalRecovered;

  return { rev, saving60, opFund40, totExp, opBalance, totInvested, droneRecovery, manualRecovery, totalRecovered, netBalance };
}

async function submitCompletion(bkId) {
  const notes=(document.getElementById('cpNotes')?.value||'').trim();
  if(!notes){ window._toastMsg('Completion notes are required','error'); document.getElementById('cpNotes').focus(); return; }
  const bk=AD.bookings.find(b=>b.id===bkId); if(!bk) return;

  const completionData={
    notes,
    chemical:    document.getElementById('cpChem')?.value||'',
    actualAcres: parseFloat(document.getElementById('cpAcres')?.value)||bk.acres,
    fuelUsed:    parseFloat(document.getElementById('cpFuel')?.value)||0,
    hoursUsed:   parseFloat(document.getElementById('cpHours')?.value)||0,
    weather:     document.getElementById('cpWeather')?.value||'',
    remarks:     document.getElementById('cpRemarks')?.value||'',
    completedBy: CU.id,
    completedAt: Date.now()
  };

  bk.status='completed';
  bk.completedBy=CU.id;
  bk.completedByName=CU.name;
  bk.completedAt=Date.now();
  bk.completionData=completionData;
  save();

  if(window.firebaseReady&&window.FB)
    window.FB.update(window.FB.ref(window.FB.db,`bookings/${bkId}`),{
      status:'completed',completedBy:CU.id,completedByName:CU.name,
      completedAt:bk.completedAt,completionData
    }).catch(()=>{});

  const msg=`✅ ${bkId} (${bk.farmer} — ${bk.acres} ac) completed by ${CU.name}`;
  if(bk.createdBy&&bk.createdBy!==CU.id) addNotif(msg,'success',bk.createdBy);
  addNotif(msg,'success','manager');
  window._toastMsg(`✅ Booking ${bkId} completed with info!`);
  closeModal('mComplete');
  if(window._page==='bookings') renderBookings();
  if(window._page==='dashboard') renderDash();
  updateBadges();
}

function getMyBookings() {
  if(CU.role==='manager') return AD.bookings;
  if(CU.role==='pilot') return AD.bookings.filter(b=>String(b.assignedTo).trim()===String(CU.id).trim());
  return AD.bookings.filter(b=>String(b.createdBy).trim()===String(CU.id).trim());
}

function calcBK() {
  const a=parseFloat(document.getElementById('bkAcres')?.value)||0;
  const p=parseFloat(document.getElementById('bkPrice')?.value)||0;
  const d=parseFloat(document.getElementById('bkDiscount')?.value)||0;
  const f=Math.max(0,p-d); const t=a*f;
  const fe=document.getElementById('bkFinalPrice'); if(fe) fe.value=fc(f);
  const te=document.getElementById('bkTotal');      if(te) te.value=fc(t);
}

function renderBKList(list) {
  const tbody=document.getElementById('bookingsList'); if(!tbody) return;

function filterBK() {
  const q=(document.getElementById('bkSearch')?.value||'').toLowerCase();
  const sf=document.getElementById('bkStatusF')?.value||'';
  let list=getMyBookings().filter(b=>{
    const ms=!q||b.farmer.toLowerCase().includes(q)||b.id.toLowerCase().includes(q)||(b.location||'').toLowerCase().includes(q);
    const ss=!sf||b.status===sf; return ms&&ss;
  });
  renderBKList(list);
}

async function createBooking() {
  const btn=document.getElementById('bkSubmitBtn');
  if(btn){ btn.disabled=true; btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> Creating...'; }
  const farmer=(document.getElementById('bkFarmer')?.value||'').trim();
  const acres=parseFloat(document.getElementById('bkAcres')?.value)||0;
  if(!farmer){ window._toastMsg('Farmer name is required','error'); if(btn){btn.disabled=false;btn.innerHTML='<i class="fas fa-plus"></i> Create Booking';} return; }
  if(acres<=0){ window._toastMsg('Acres must be greater than 0','error'); if(btn){btn.disabled=false;btn.innerHTML='<i class="fas fa-plus"></i> Create Booking';} return; }

  const price=parseFloat(document.getElementById('bkPrice')?.value)||1500;
  const discount=parseFloat(document.getElementById('bkDiscount')?.value)||0;
  const finalPrice=Math.max(0,price-discount);
  const total=parseFloat((acres*finalPrice).toFixed(2));
  const id=await bkNum();

  const booking={
    id, farmer, acres, price, discount, finalPrice, total,
    contact:    document.getElementById('bkContact')?.value||'',
    location:   document.getElementById('bkLocation')?.value||'',
    crop:       document.getElementById('bkCrop')?.value||'',
    sprayType:  document.getElementById('bkSprayType')?.value||'',
    product:    document.getElementById('bkProduct')?.value||'',
    date:       document.getElementById('bkDate')?.value||today(),
    notes:      document.getElementById('bkNotes')?.value||'',
    assignedTo:'', assignedToName:'',
    status:'pending',
    createdBy:CU.id, createdByName:CU.name,
    createdAt:Date.now()
  };

  AD.bookings.push(booking); save();
  if(window.firebaseReady&&window.FB)
    window.FB.update(window.FB.ref(window.FB.db,`bookings/${booking.id}`),booking).catch(()=>{});

  // Notify manager a booking was created
  addNotif(`📋 New booking ${id} by ${CU.name} — ${farmer} (${acres} ac)`, 'info', 'manager');

  window._toastMsg(`✅ Booking ${id} created! Manager will assign a pilot.`);

function delBK(id) {
  if(!confirm('Delete this booking permanently? This will also remove it from all employees\' views.')) return;
  const hasInv=AD.invoices.find(i=>i.bookingId===id);
  if(hasInv&&!confirm(`Invoice ${hasInv.id} is linked. Also delete it?`)) return;

  // Cascade: delete linked invoice too
  if(hasInv){
    if(!AD.deletedINVIds) AD.deletedINVIds=[];
    if(!AD.deletedINVIds.includes(hasInv.id)) AD.deletedINVIds.push(hasInv.id);
    AD.invoices=AD.invoices.filter(i=>i.id!==hasInv.id);
    if(window.firebaseReady&&window.FB) window.FB.remove(window.FB.ref(window.FB.db,`invoices/${hasInv.id}`)).catch(()=>{});
  }

  if(!AD.deletedBKIds) AD.deletedBKIds=[];
  if(!AD.deletedBKIds.includes(id)) AD.deletedBKIds.push(id);
  AD.bookings=AD.bookings.filter(b=>b.id!==id);
  save();
  if(window.firebaseReady&&window.FB) window.FB.remove(window.FB.ref(window.FB.db,`bookings/${id}`)).catch(()=>{});

  renderBookings(); window._toastMsg('Booking (and linked invoice) deleted from all views');
}

function fillInvFromBK(bid) {
  if(!bid) return;
  const bk=AD.bookings.find(b=>b.id===bid); if(!bk){ window._toastMsg('Booking not found','error'); return; }
  const sv=(id,v)=>{ const el=document.getElementById(id); if(el) el.value=v||''; };
  sv('invFarmer',bk.farmer); sv('invContact',bk.contact);
  sv('invAcres',bk.completionData?.actualAcres||bk.acres);
  sv('invLoc',bk.location); sv('invCrop',bk.crop);
  sv('invProduct',bk.completionData?.chemical||bk.product);
  sv('invPrice',bk.price||1500); sv('invDisc',bk.discount||0); sv('invBKId',bk.id);
  const ss=document.getElementById('invSpray');
  if(ss&&bk.sprayType) for(let o of ss.options){ if(o.text===bk.sprayType){ss.value=o.value;break;} }
  const sel=document.getElementById('invBKSel'); if(sel) sel.value=bid;

}

function toggleTrx(){ const m=document.getElementById('invPayM')?.value; const g=document.getElementById('trxGrp'); if(g) g.style.display=m==='cash'?'none':'block'; }
function calcINV() {
  const a=parseFloat(document.getElementById('invAcres')?.value)||0;
  const p=parseFloat(document.getElementById('invPrice')?.value)||0;
  const d=parseFloat(document.getElementById('invDisc')?.value)||0;
  const f=Math.max(0,p-d); const t=a*f;
  const fe=document.getElementById('invFinal'); if(fe) fe.value=fc(f);
  const te=document.getElementById('invTot');   if(te) te.value=fc(t);
  calcChange();
}
function calcChange() {
  const tot=parseFloat((document.getElementById('invTot')?.value||'').replace(/[^\d.]/g,''))||0;
  const paid=parseFloat(document.getElementById('invPaid')?.value)||0;
  const ch=document.getElementById('invChange');
  if(ch) ch.value=paid>=tot?fc(paid-tot):`Need ${fc(tot-paid)} more`;
}

async function createInvoice() {
  const btn=document.getElementById('invSubmitBtn');
  if(btn){ btn.disabled=true; btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> Submitting...'; }
  const farmer=(document.getElementById('invFarmer')?.value||'').trim();
  const acres=parseFloat(document.getElementById('invAcres')?.value)||0;
  const product=(document.getElementById('invProduct')?.value||'').trim();
  if(!farmer){ window._toastMsg('Farmer name is required','error'); if(btn){btn.disabled=false;btn.innerHTML='<i class="fas fa-paper-plane"></i> Submit Invoice';} return; }
  if(acres<=0){ window._toastMsg('Acres must be > 0','error'); if(btn){btn.disabled=false;btn.innerHTML='<i class="fas fa-paper-plane"></i> Submit Invoice';} return; }
  if(!product){ window._toastMsg('Product / chemical required','error'); if(btn){btn.disabled=false;btn.innerHTML='<i class="fas fa-paper-plane"></i> Submit Invoice';} return; }

  const price=parseFloat(document.getElementById('invPrice')?.value)||1500;
  const disc=parseFloat(document.getElementById('invDisc')?.value)||0;
  const finalPrice=Math.max(0,price-disc);
  const total=parseFloat((acres*finalPrice).toFixed(2));
  const paidRaw=parseFloat(document.getElementById('invPaid')?.value)||0;
  const paid=paidRaw>0?paidRaw:total;
  const bkId=(document.getElementById('invBKId')?.value||'').trim()||null;

  // FIX: Check for duplicate invoice for same booking
  if(bkId&&AD.invoices.find(i=>i.bookingId===bkId&&i.id)){
    if(!confirm(`An invoice already exists for booking ${bkId}. Create another?`)){
      if(btn){btn.disabled=false;btn.innerHTML='<i class="fas fa-paper-plane"></i> Submit Invoice';} return;
    }
  }

  const id=await invNum();
  const inv={
    id, farmer, acres, total, paid, price, discount:disc, finalPrice, product,
    contact:   document.getElementById('invContact')?.value||'',
    location:  document.getElementById('invLoc')?.value||'',
    crop:      document.getElementById('invCrop')?.value||'',
    sprayType: document.getElementById('invSpray')?.value||'',
    change:    Math.max(0,paid-total),
    bookingId: bkId,
    paymentMethod: document.getElementById('invPayM')?.value||'cash',
    transactionId: document.getElementById('invTrx')?.value||'',
    date: today(),
    status:'pending',
    createdBy:CU.id, createdByName:CU.name, createdAt:Date.now()
  };

  // FIX: deduplicate by id before push
  if(!AD.invoices.find(x=>x.id===id)) AD.invoices.push(inv);
  if(bkId){
    const bk=AD.bookings.find(b=>b.id===bkId);
    if(bk){
      bk.status='invoiced'; bk.invoicedByName=CU.name; bk.invoicedAt=Date.now();
      if(bk.createdBy&&bk.createdBy!==CU.id)
        addNotif(`🧾 Your booking ${bkId} (${bk.farmer}) has been invoiced by ${CU.name}`,'info',bk.createdBy);
      if(window.firebaseReady&&window.FB)
        window.FB.update(window.FB.ref(window.FB.db,`bookings/${bkId}`),{status:'invoiced',invoicedByName:CU.name,invoicedAt:Date.now()}).catch(()=>{});
    }
  }
  save();
  if(window.firebaseReady&&window.FB)
    window.FB.update(window.FB.ref(window.FB.db,`invoices/${inv.id}`),inv).catch(()=>{});

  addNotif(`📄 Invoice ${id} by ${CU.name} — ${fc(total)}`, 'info', 'manager');
  window._toastMsg(`✅ Invoice ${id} submitted for approval!`);
  renderInvoices(); updateBadges();
  if(btn){ btn.disabled=false; btn.innerHTML='<i class="fas fa-paper-plane"></i> Submit Invoice'; }
}

async function approveInv(iid, ok) {
  const ab=document.querySelector('#approveBox .btn-success'); if(ab) ab.disabled=true;
  const rb=document.querySelector('#approveBox .btn-danger');  if(rb) rb.disabled=true;

  if(window.firebaseReady&&window.FB) {
    try {
      const invRef=window.FB.ref(window.FB.db,`invoices/${iid}`);
      let alreadyDone=false;
      await window.FB.runTransaction(invRef,cur=>{ if(!cur) return cur; if(cur.status!=='pending'){alreadyDone=true;return;} cur.status=ok?'approved':'rejected'; cur.approvedBy=CU.id; cur.approvedAt=Date.now(); return cur; });
      if(alreadyDone){ window._toastMsg('⚠️ Already processed by another manager','error'); closeModal('mApprove'); renderInvoices(); return; }
      const i=AD.invoices.findIndex(x=>x.id===iid);
      if(i!==-1){ AD.invoices[i].status=ok?'approved':'rejected'; AD.invoices[i].approvedBy=CU.id; AD.invoices[i].approvedAt=Date.now(); }
      save();
    } catch(err) {
      const inv=AD.invoices.find(x=>x.id===iid);
      if(inv){ inv.status=ok?'approved':'rejected'; save(); window.FB.update(window.FB.ref(window.FB.db,`invoices/${iid}`),{status:inv.status}).catch(()=>{}); }
    }
  } else {
    const inv=AD.invoices.find(x=>x.id===iid);
    if(inv){ inv.status=ok?'approved':'rejected'; save(); }
  }

  const inv=AD.invoices.find(x=>x.id===iid);
  const msg=ok?`✅ Invoice ${iid} approved!`:`❌ Invoice ${iid} rejected`;
  if(inv) addNotif(msg, ok?'success':'error', inv.createdBy);
  window._toastMsg(ok?'Invoice approved!':'Invoice rejected');
  closeModal('mApprove');
  renderInvoices(); renderDash(); updateBadges();
}

function delInv(id) {
  const inv=AD.invoices.find(i=>i.id===id); if(!inv){ window._toastMsg('Not found','error'); return; }
  if(!confirm(`Delete invoice ${id}?\n${fc(inv.total)} | ${inv.acres} ac\n\nThis will also update the linked booking status.`)) return;
  // Reset linked booking
  if(inv.bookingId){
    const bk=AD.bookings.find(b=>b.id===inv.bookingId);
    if(bk&&bk.status==='invoiced'){
      bk.status=bk.completedAt?'completed':'pending';
      if(window.firebaseReady&&window.FB) window.FB.update(window.FB.ref(window.FB.db,`bookings/${bk.id}`),{status:bk.status}).catch(()=>{});
    }
  }
  if(!AD.deletedINVIds) AD.deletedINVIds=[];
  if(!AD.deletedINVIds.includes(id)) AD.deletedINVIds.push(id);
  AD.invoices=AD.invoices.filter(i=>i.id!==id);
  save();
  if(window.firebaseReady&&window.FB) window.FB.remove(window.FB.ref(window.FB.db,`invoices/${id}`)).catch(()=>{});
  renderInvoices(); renderDash(); updateBadges();
  window._toastMsg(`✅ Invoice ${id} deleted`);
}

          <td style="font-size:11px;">${e.description||'—'}</td>
          <td><button class="btn btn-danger btn-xs" onclick="delExp(${e.id})"><i class="fas fa-trash"></i></button></td>
        </tr>`).join('')||'<tr><td colspan="6" style="color:var(--t3);text-align:center;">No expenses</td></tr>'}

function addExpense(){ const amt=parseFloat(document.getElementById('expAmt').value)||0; if(amt<=0){window._toastMsg('Enter valid amount','error');return;} AD.expenses.push({id:Date.now()+Math.random(),date:document.getElementById('expDate').value,category:document.getElementById('expCat').value,amount:amt,description:document.getElementById('expDesc').value}); save(); renderExpenses(); window._toastMsg('Expense added'); }
function delExp(id){ if(!confirm('Delete?')) return; AD.expenses=AD.expenses.filter(e=>e.id!==id); save(); renderExpenses(); }
function processSalary(){
  const currentMonth=today().slice(0,7);
  const actives=AD.users.filter(u=>u.active&&u.status==='active'&&(u.salary||0)>0);
  if(!actives.length){window._toastMsg('No active employees with salary','error');return;}
  const alreadyDone=actives.some(u=>AD.expenses.some(e=>e.category==='Salary'&&e.employeeId===u.id&&e.date?.startsWith(currentMonth)));
  if(alreadyDone&&!confirm(`Salary for ${currentMonth} already processed. Process again (creates duplicates)?`)) return;
  let tot=0;
  actives.forEach(u=>{
    AD.expenses.push({id:Date.now()+Math.random(),date:today(),category:'Salary',employeeId:u.id,employeeName:u.name,employeeRole:u.designation||u.role,amount:u.salary||0,description:`Salary: ${u.name} (${currentMonth})`});
    tot+=u.salary||0;
  });
  save(); renderExpenses(); window._toastMsg(`✅ Salary processed: ${fc(tot)} for ${actives.length} employees`);
}

let _plChart=null;
function renderReports(){
  if(CU.role!=='manager'){ document.getElementById('content').innerHTML='<div class="card" style="padding:40px;text-align:center;color:var(--t3);">Access restricted</div>'; return; }
  const allDates=[...AD.invoices.map(i=>i.date),...AD.expenses.map(e=>e.date),...AD.bookings.map(b=>b.date)].filter(Boolean);
  const months=[...new Set(allDates.map(d=>d.slice(0,7)))].sort();
  const currentMonth=today().slice(0,7);
  if(!months.includes(currentMonth)) months.push(currentMonth);
  const monthData=months.map(m=>{
    const mInvs=AD.invoices.filter(i=>i.date?.startsWith(m));
    const mExps=AD.expenses.filter(e=>e.date?.startsWith(m));
    const mBks=AD.bookings.filter(b=>b.date?.startsWith(m));
    const revenue=mInvs.filter(i=>i.status==='approved').reduce((s,i)=>s+i.total,0);
    const salary=mExps.filter(e=>e.category==='Salary').reduce((s,e)=>s+e.amount,0);
    const operational=mExps.filter(e=>e.category!=='Salary').reduce((s,e)=>s+e.amount,0);
    const totalExp=salary+operational;
    const profit=revenue-totalExp;
    const saving60=revenue*0.60; const opFund40=revenue*0.40;
    const acres=mInvs.filter(i=>i.status==='approved').reduce((s,i)=>s+i.acres,0);
    const label=new Date(m+'-01').toLocaleDateString('en-PK',{month:'short',year:'2-digit'});
    return {m,label,revenue,salary,operational,totalExp,profit,saving60,opFund40,acres,bookings:mBks.length};
  });
  const totRev=monthData.reduce((s,d)=>s+d.revenue,0);
  const totExp=monthData.reduce((s,d)=>s+d.totalExp,0);
  const totPro=totRev-totExp;
  const totAcres=monthData.reduce((s,d)=>s+d.acres,0);
  const totSaving=totRev*0.60; const totOpFund=totRev*0.40;
  document.getElementById('content').innerHTML=`
    <div class="pnl-summary">
      <div class="pnl-box revenue"><div class="pnl-box-val" style="color:var(--grn);">${fc(totRev)}</div><div class="pnl-box-lbl">Total Revenue</div></div>
      <div class="pnl-box expense"><div class="pnl-box-val" style="color:var(--red);">${fc(totExp)}</div><div class="pnl-box-lbl">Total Expenses</div></div>
      <div class="pnl-box profit"><div class="pnl-box-val" style="color:${totPro>=0?'var(--accent2)':'var(--red)'}">${fc(totPro)}</div><div class="pnl-box-lbl">Net Profit / Loss</div></div>
      <div class="pnl-box saving"><div class="pnl-box-val" style="color:#b39ddb;">${fc(totSaving)}</div><div class="pnl-box-lbl">60% Drone Savings</div></div>
      <div class="pnl-box" style="background:rgba(245,166,35,0.07);border-color:rgba(245,166,35,0.15);"><div class="pnl-box-val" style="color:var(--gold);">${fc(totOpFund)}</div><div class="pnl-box-lbl">40% Op. Fund</div></div>
    </div>
    <div class="card"><div class="card-title">📊 Revenue vs Expenses (Monthly)</div>
      <div class="chart-tabs">
        <button class="chart-tab active" id="tab-bar" onclick="switchChart('bar')">Bar Chart</button>
        <button class="chart-tab" id="tab-line" onclick="switchChart('line')">Line Trend</button>
        <button class="chart-tab" id="tab-acres" onclick="switchChart('acres')">Acres & Bookings</button>
        <button class="chart-tab" id="tab-split" onclick="switchChart('split')">Revenue Split</button>
      </div>
      <div class="chart-wrap" style="height:340px;"><canvas id="mainChart"></canvas></div>
    </div>
    <div class="g2">
      <div class="card"><div class="card-title">📈 Profit Trend</div><div class="chart-wrap" style="height:220px;"><canvas id="profitChart"></canvas></div></div>
      <div class="card"><div class="card-title">🥧 Revenue Split (60/40)</div><div class="chart-wrap" style="height:220px;"><canvas id="expPieChart"></canvas></div></div>
    </div>
    <div class="card"><div class="card-title">📋 Monthly P&L Breakdown</div>
      <div class="tbl-wrap"><table>
        <thead><tr><th>Month</th><th>Revenue</th><th>60% Saving</th><th>40% Op</th><th>Expenses</th><th>Net P/L</th><th>Acres</th><th>Margin</th></tr></thead>
        <tbody>
          ${[...monthData].reverse().map(d=>{ const margin=d.revenue>0?((d.profit/d.revenue)*100).toFixed(1):'0.0'; const isProfit=d.profit>=0; return `<tr>
            <td style="font-weight:700;">${d.label}</td>
            <td style="color:var(--grn);font-weight:600;">${fc(d.revenue)}</td>
            <td style="color:#b39ddb;">${fc(d.saving60)}</td>
            <td style="color:var(--gold);">${fc(d.opFund40)}</td>
            <td style="color:#ef5350;font-weight:600;">${fc(d.totalExp)}</td>
            <td style="color:${isProfit?'var(--accent2)':'var(--red)'};font-weight:800;">${isProfit?'+':''}${fc(d.profit)}</td>
            <td>${d.acres.toLocaleString()}</td>
            <td><span class="badge ${isProfit?'b-active':'b-rejected'}">${margin}%</span></td>
          </tr>`; }).join('')}
          <tr style="border-top:2px solid var(--border2);background:rgba(255,255,255,0.03);">
            <td style="font-weight:800;color:var(--gold);">TOTAL</td>
            <td style="color:var(--grn);font-weight:800;">${fc(totRev)}</td>
            <td style="color:#b39ddb;font-weight:700;">${fc(totSaving)}</td>
            <td style="color:var(--gold);font-weight:700;">${fc(totOpFund)}</td>
            <td style="color:#ef5350;font-weight:800;">${fc(totExp)}</td>
            <td style="color:${totPro>=0?'var(--accent2)':'var(--red)'};font-weight:900;font-size:14px;">${totPro>=0?'+':''}${fc(totPro)}</td>
            <td style="font-weight:700;">${totAcres.toLocaleString()}</td>
            <td><span class="badge ${totPro>=0?'b-active':'b-rejected'}">${totRev>0?((totPro/totRev)*100).toFixed(1):0}%</span></td>
          </tr>
        </tbody>
      </table></div>
    </div>`;
  window._reportData=monthData;
  setTimeout(()=>{ drawMainChart('bar',monthData); drawProfitChart(monthData); drawExpPie(monthData); },60);
}
function switchChart(type){ document.querySelectorAll('.chart-tab').forEach(t=>t.classList.remove('active')); document.getElementById('tab-'+type)?.classList.add('active'); drawMainChart(type,window._reportData||[]); }
function drawMainChart(type,data){
  const ctx=document.getElementById('mainChart'); if(!ctx) return;
  if(_plChart){_plChart.destroy();_plChart=null;}
  const labels=data.map(d=>d.label);
  const base={responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'rgba(248,250,248,0.7)',font:{size:11}}},tooltip:{backgroundColor:'rgba(5,10,6,0.95)',titleColor:'#f5a623',bodyColor:'#f8faf8',borderColor:'rgba(255,255,255,0.1)',borderWidth:1}},scales:{x:{ticks:{color:'rgba(248,250,248,0.5)',font:{size:10}},grid:{color:'rgba(255,255,255,0.04)'}},y:{ticks:{color:'rgba(248,250,248,0.5)',font:{size:10},callback:v=>'₨'+v.toLocaleString()},grid:{color:'rgba(255,255,255,0.04)'}}}};
  if(type==='bar'){
    _plChart=new Chart(ctx,{type:'bar',data:{labels,datasets:[
      {label:'Revenue',data:data.map(d=>d.revenue),backgroundColor:'rgba(45,198,83,0.7)',borderRadius:4},
      {label:'Expenses',data:data.map(d=>d.totalExp),backgroundColor:'rgba(230,57,70,0.6)',borderRadius:4},
      {label:'Profit/Loss',data:data.map(d=>d.profit),backgroundColor:data.map(d=>d.profit>=0?'rgba(0,180,216,0.65)':'rgba(230,57,70,0.35)'),borderRadius:4}
    ]},options:base});
  } else if(type==='line'){
    _plChart=new Chart(ctx,{type:'line',data:{labels,datasets:[
      {label:'Revenue',data:data.map(d=>d.revenue),borderColor:'#2dc653',backgroundColor:'rgba(45,198,83,0.08)',fill:true,tension:0.4,pointRadius:4},
      {label:'Expenses',data:data.map(d=>d.totalExp),borderColor:'#e63946',backgroundColor:'rgba(230,57,70,0.06)',fill:true,tension:0.4,pointRadius:4},
      {label:'Profit',data:data.map(d=>d.profit),borderColor:'#00b4d8',fill:false,tension:0.4,pointRadius:5,borderWidth:2.5}
    ]},options:base});
  } else if(type==='acres'){
    _plChart=new Chart(ctx,{type:'bar',data:{labels,datasets:[
      {label:'Acres',data:data.map(d=>d.acres),backgroundColor:'rgba(6,214,160,0.65)',borderRadius:4,yAxisID:'y'},
      {label:'Bookings',type:'line',data:data.map(d=>d.bookings),borderColor:'#f5a623',tension:0.4,pointRadius:5,yAxisID:'y2'}
    ]},options:{...base,scales:{x:base.scales.x,y:{...base.scales.y,position:'left',ticks:{...base.scales.y.ticks,callback:v=>v+' ac'}},y2:{ticks:{color:'rgba(245,166,35,0.7)',font:{size:10}},grid:{display:false},position:'right'}}}});
  } else if(type==='split'){
    _plChart=new Chart(ctx,{type:'bar',data:{labels,datasets:[
      {label:'60% Drone Saving',data:data.map(d=>d.saving60),backgroundColor:'rgba(123,94,167,0.7)',borderRadius:4},
      {label:'40% Op. Fund',data:data.map(d=>d.opFund40),backgroundColor:'rgba(245,166,35,0.65)',borderRadius:4},
    ]},options:{...base,scales:{...base.scales,x:{...base.scales.x,stacked:true},y:{...base.scales.y,stacked:true}}}});
  }
}
function drawProfitChart(data){
  const ctx=document.getElementById('profitChart'); if(!ctx) return;
  new Chart(ctx,{type:'line',data:{labels:data.map(d=>d.label),datasets:[{label:'Monthly Profit/Loss',data:data.map(d=>d.profit),borderColor:'#00b4d8',backgroundColor:c=>{const g=c.chart.ctx.createLinearGradient(0,0,0,180);g.addColorStop(0,'rgba(0,180,216,0.2)');g.addColorStop(1,'rgba(0,180,216,0)');return g;},fill:true,tension:0.4,pointRadius:4,pointBackgroundColor:data.map(d=>d.profit>=0?'#2dc653':'#e63946'),borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:'rgba(5,10,6,0.95)',titleColor:'#f5a623',bodyColor:'#f8faf8',callbacks:{label:c=>'Profit: ₨'+c.raw.toLocaleString()}}},scales:{x:{ticks:{color:'rgba(248,250,248,0.4)',font:{size:9}},grid:{color:'rgba(255,255,255,0.03)'}},y:{ticks:{color:'rgba(248,250,248,0.4)',font:{size:9},callback:v=>'₨'+v.toLocaleString()},grid:{color:'rgba(255,255,255,0.03)'}}}}});
}
function drawExpPie(data){
  const ctx=document.getElementById('expPieChart'); if(!ctx) return;
  const totRev=data.reduce((s,d)=>s+d.revenue,0);
  new Chart(ctx,{type:'doughnut',data:{labels:['60% Drone Savings','40% Operational Fund'],datasets:[{data:[totRev*0.6,totRev*0.4],backgroundColor:['rgba(123,94,167,0.75)','rgba(245,166,35,0.75)'],borderColor:['#7b5ea7','#f5a623'],borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'rgba(248,250,248,0.7)',font:{size:11}},position:'bottom'},tooltip:{backgroundColor:'rgba(5,10,6,0.95)',titleColor:'#f5a623',bodyColor:'#f8faf8',callbacks:{label:c=>`${c.label}: ₨${c.raw.toLocaleString()}`}}}}});
}

function autoRole(){const des=document.getElementById('eDes')?.value||'';const role=DES_ROLE[des]||'agri';const defaults=ROLE_ACCESS[role]||['dashboard'];document.querySelectorAll('#accessChecks input[type=checkbox]').forEach(cb=>{cb.checked=defaults.includes('all')||defaults.includes(cb.value);});}
function addEmployee(){
  const name=document.getElementById('eName').value.trim();
  const email=document.getElementById('eEmail').value.trim().toLowerCase();
  const pwd=document.getElementById('ePwd').value.trim();
  const designation=document.getElementById('eDes').value;
  const role=DES_ROLE[designation]||'agri';
  const salary=parseFloat(document.getElementById('eSal').value)||0;
  const phone=document.getElementById('ePhone').value.trim();
  const cnic=document.getElementById('eCnic').value.trim();
  if(!name){window._toastMsg('Name required','error');return;}
  if(!email||!email.includes('@')){window._toastMsg('Valid email required','error');return;}
  if(!pwd||pwd.length<4){window._toastMsg('Password min 4 chars','error');return;}
  if(AD.users.find(u=>u.email.toLowerCase()===email)){window._toastMsg('Email already registered','error');return;}
  let access=[];
  document.querySelectorAll('#accessChecks input[type=checkbox]:checked').forEach(cb=>{if(!access.includes(cb.value))access.push(cb.value);});
  if(!access.length) access=[...(ROLE_ACCESS[role]||['dashboard','bookings'])];
  if(!access.includes('dashboard')&&!access.includes('all')) access.unshift('dashboard');
  const newUser={id:'u_'+Date.now(),email,password:pwd,role,designation,name,active:true,joinDate:document.getElementById('eJoin').value||today(),salary,phone,cnic,status:'active',access};
  AD.users.push(newUser); save();
  if(window.firebaseReady&&window.FB) window.FB.update(window.FB.ref(window.FB.db,`users/${newUser.id}`),newUser).catch(()=>{});
  window._toastMsg(`✅ ${name} added`);
  renderEmployees();
  ['eName','eEmail','ePwd','eSal','ePhone','eCnic'].forEach(id=>{ const el=document.getElementById(id); if(el) el.value=''; });
}
function editSalary(uid){const u=AD.users.find(u=>u.id===uid);if(!u)return;const ns=prompt(`New salary for ${u.name}:`,u.salary||0);if(ns===null)return;const p=parseFloat(ns);if(isNaN(p)||p<0){window._toastMsg('Invalid','error');return;}u.salary=p;save();renderEmployees();window._toastMsg(`✅ Salary: ${fc(p)}`);}
function setEmpStatus(uid,st){const u=AD.users.find(u=>u.id===uid);if(u){u.status=st;u.active=st==='active';save();renderEmployees();window._toastMsg(`${u.name} → ${st}`);}}
function delEmp(uid){
  if(!confirm('Delete permanently?')) return;
  const isDefault=DEF_USERS.some(du=>du.id===uid);
  if(isDefault){if(!AD.deletedDefaults)AD.deletedDefaults=[];if(!AD.deletedDefaults.includes(uid))AD.deletedDefaults.push(uid);}
  AD.users=AD.users.filter(u=>u.id!==uid); save();
  if(window.firebaseReady&&window.FB) window.FB.remove(window.FB.ref(window.FB.db,`users/${uid}`)).catch(()=>{});
  renderEmployees(); window._toastMsg('Employee deleted');
}
function fireEmployee(uid){
  const u=AD.users.find(u=>u.id===uid); if(!u) return;
  if(uid==='u1'){window._toastMsg('Cannot fire primary manager','error');return;}
  if(!confirm(`FIRE ${u.name.toUpperCase()}?\nThis immediately revokes all access.`)) return;
  u.status='fired'; u.active=false; u.firedDate=today(); u.firedBy=CU.name; save();
  if(window.firebaseReady&&window.FB) window.FB.update(window.FB.ref(window.FB.db,`users/${uid}`),{status:'fired',active:false,firedDate:today(),firedBy:CU.name}).catch(()=>{});
  addNotif(`🔥 ${u.name} has been terminated by ${CU.name}`,'error','manager');
  window._toastMsg(`🔥 ${u.name} fired`,'error');
  renderEmployees();
}

function clearAllData(){if(!confirm('Delete ALL data? Cannot be undone.'))return;localStorage.clear();location.reload();}
function importData(evt){
  const file=evt.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const parsed=JSON.parse(e.target.result);
      if(!parsed.bookings&&!parsed.users){window._toastMsg('Invalid file','error');return;}
      if(!confirm(`Import? ${(parsed.bookings||[]).length} bookings, ${(parsed.invoices||[]).length} invoices.`))return;
      ['bookings','invoices','expenses','investments','drones','generators'].forEach(key=>{
        if(!parsed[key])return;
        if(!AD[key])AD[key]=[];
        parsed[key].forEach(item=>{if(item.id&&!AD[key].find(x=>x.id===item.id))AD[key].push(item);});
      });
      if(parsed.users)parsed.users.forEach(pu=>{if(!AD.users.find(u=>u.id===pu.id))AD.users.push(pu);});
      if(parsed.nextBK>AD.nextBK)AD.nextBK=parsed.nextBK;
      if(parsed.nextINV>AD.nextINV)AD.nextINV=parsed.nextINV;
      save();window._toastMsg('✅ Import complete!');renderSettings();
    }catch(err){window._toastMsg('Failed to read file','error');}
  };
  reader.readAsText(file);
}
function exportMonthlyPDF(mode){
  const month=mode==='all'?null:document.getElementById('rptMonth')?.value;
  if(!mode&&!month){window._toastMsg('Select a month first','error');return;}
  const label=month?new Date(month+'-01').toLocaleDateString('en-PK',{year:'numeric',month:'long'}):'All Records';
  const bks=month?AD.bookings.filter(b=>b.date?.startsWith(month)):AD.bookings;
  const invs=month?AD.invoices.filter(i=>i.date?.startsWith(month)):AD.invoices;
  const exps=month?AD.expenses.filter(e=>e.date?.startsWith(month)):AD.expenses;
  const totalRev=invs.filter(i=>i.status==='approved').reduce((s,i)=>s+i.total,0);
  const totalExp=exps.reduce((s,e)=>s+e.amount,0);
  const totalAcres=invs.filter(i=>i.status==='approved').reduce((s,i)=>s+i.acres,0);
  const styles=`body{font-family:Arial,sans-serif;color:#111;padding:24px;font-size:12px;}h1{color:#1a5c2e;}h2{color:#1a5c2e;font-size:15px;margin:20px 0 8px;border-bottom:2px solid #1a5c2e;padding-bottom:4px;}.kpis{display:flex;gap:16px;margin-bottom:20px;flex-wrap:wrap;}.kpi{background:#f0f7f0;border:1px solid #c8e6c9;border-radius:8px;padding:12px 20px;text-align:center;}.kpi-val{font-size:20px;font-weight:800;color:#1a5c2e;}.kpi-lbl{font-size:10px;color:#555;}table{width:100%;border-collapse:collapse;margin-bottom:20px;font-size:11px;}th{background:#1a5c2e;color:#fff;padding:7px 8px;text-align:left;}td{padding:6px 8px;border-bottom:1px solid #e0e0e0;}tr:nth-child(even)td{background:#f9f9f9;}.footer{margin-top:30px;text-align:center;font-size:10px;color:#999;border-top:1px solid #eee;padding-top:12px;}`;
  const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Report</title><style>${styles}</style></head><body>
    <h1>🚁 ${AD.company||'AgriSpray Pro'}</h1>
    <p>Period: <strong>${label}</strong> | Generated: ${new Date().toLocaleDateString('en-PK',{dateStyle:'full'})} | By: ${CU.name}</p>
    <div class="kpis"><div class="kpi"><div class="kpi-val">${bks.length}</div><div class="kpi-lbl">Bookings</div></div><div class="kpi"><div class="kpi-val">₨${totalRev.toLocaleString()}</div><div class="kpi-lbl">Revenue</div></div><div class="kpi"><div class="kpi-val">₨${(totalRev*0.6).toLocaleString()}</div><div class="kpi-lbl">60% Drone Saving</div></div><div class="kpi"><div class="kpi-val">₨${(totalRev*0.4).toLocaleString()}</div><div class="kpi-lbl">40% Op. Fund</div></div><div class="kpi"><div class="kpi-val">₨${totalExp.toLocaleString()}</div><div class="kpi-lbl">Expenses</div></div><div class="kpi"><div class="kpi-val">${totalAcres.toLocaleString()}</div><div class="kpi-lbl">Acres</div></div></div>
    <h2>📋 Bookings</h2><table><thead><tr><th>ID</th><th>Date</th><th>Farmer</th><th>Acres</th><th>Total</th><th>By</th><th>Pilot</th><th>Status</th><th>Completion Notes</th></tr></thead><tbody>${bks.map(b=>`<tr><td>${b.id}</td><td>${b.date||'—'}</td><td>${b.farmer}</td><td>${b.acres}</td><td>₨${(b.total||0).toLocaleString()}</td><td>${b.createdByName||'—'}</td><td>${b.assignedToName||'—'}</td><td>${b.status}</td><td>${b.completionData?.notes||'—'}</td></tr>`).join('')||'<tr><td colspan="9" style="text-align:center;">No bookings</td></tr>'}</tbody></table>
    <h2>🧾 Invoices</h2><table><thead><tr><th>ID</th><th>Date</th><th>Farmer</th><th>Product</th><th>Acres</th><th>Total</th><th>By</th><th>Status</th></tr></thead><tbody>${invs.map(i=>`<tr><td>${i.id}</td><td>${i.date||'—'}</td><td>${i.farmer}</td><td>${i.product||'—'}</td><td>${i.acres}</td><td>₨${(i.total||0).toLocaleString()}</td><td>${i.createdByName||'—'}</td><td>${i.status}</td></tr>`).join('')||'<tr><td colspan="8" style="text-align:center;">No invoices</td></tr>'}</tbody></table>
    <h2>📉 Expenses</h2><table><thead><tr><th>Date</th><th>Category</th><th>Employee</th><th>Amount</th><th>Description</th></tr></thead><tbody>${exps.map(e=>`<tr><td>${e.date}</td><td>${e.category}</td><td>${e.employeeName||'—'}</td><td>₨${(e.amount||0).toLocaleString()}</td><td>${e.description||'—'}</td></tr>`).join('')||'<tr><td colspan="5" style="text-align:center;">No expenses</td></tr>'}</tbody></table>
    <div class="footer">${AD.company||'AgriSpray Pro'} — Confidential Report — ${new Date().getFullYear()}</div>
    <script>window.onload=()=>{window.print();}<\/script></body></html>`;
  const w=window.open('','_blank');w.document.write(html);w.document.close();
  window._toastMsg('📄 Report opened — Print → Save as PDF');
}
